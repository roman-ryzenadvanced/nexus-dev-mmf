name: CI

on:
  push:
    branches: [main, master]
    paths:
      - 'packages/nexus-code/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'packages/nexus-code/**'
      - '.github/workflows/ci.yml'

defaults:
  run:
    working-directory: packages/nexus-code

jobs:
  test:
    name: Typecheck + Lint + Build + Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: packages/nexus-code/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
        env:
          # Smoke tests stay skipped in CI — they need real API keys.
          # The MCP integration tests need npx + network for the first run.
          CI: true

      - name: Upload coverage
        if: matrix.node == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: packages/nexus-code/coverage/
          retention-days: 7
